        .stat-value { font-size: 1.8rem; font-weight: bold; color: #FBBF24; }
        .progress-bar { height: 14px; background: #0F172A; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #10B981; }
        .level-badge { display: inline-block; padding: 6px 16px; background: #FBBF24; color: #0F172A; border-radius: 40px; font-weight: bold; }
        .empire-item { background: #0F172A; padding: 15px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
        .empire-item.owned { border-color: #FBBF24; background: #1E293B; }
        .empire-icon { font-size: 2.5rem; } .income-badge { color: #10B981; font-weight: bold; }
        select, input { padding: 16px; background: #0F172A; color: white; border: 1px solid #334155; border-radius: 20px; font-size: 1rem; width: 100%; margin: 8px 0; }
        canvas { max-width: 100%; height: auto; background: #0F172A; border-radius: 10px; }
        .balance-badge { background: #FBBF24; color: #0F172A; padding: 6px 14px; border-radius: 40px; font-weight: bold; display: inline-block; }
        .frame-preview { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 3px solid #334155; }
        .frame-preview.silver { border-color: #C0C0C0; box-shadow: 0 0 10px #C0C0C0; }
        .frame-preview.gold { border-color: #FFD700; box-shadow: 0 0 15px #FFD700; }
        .frame-preview.neon { border-color: #00FF00; box-shadow: 0 0 20px #00FF00; }
        .news-banner { background: #0F172A; padding: 12px; border-radius: 16px; margin-bottom: 15px; border-left: 4px solid #FBBF24; }
        .chart-axis-label { display: flex; justify-content: space-between; color: #94A3B8; font-size: 0.7rem; margin-top: 5px; }
        .stars { color: #FBBF24; font-size: 0.9rem; letter-spacing: 2px; }
        .rent-request { background: #0F172A; padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid #334155; }
        .news-item { background: #0F172A; padding: 15px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid #334155; }
        .learn-topic-card { background: #0F172A; padding: 20px; border-radius: 20px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; text-align: center; }
        .learn-topic-card:hover { border-color: #FBBF24; transform: translateY(-3px); }
        .learn-topic-card h4 { color: #FBBF24; margin-bottom: 10px; font-size: 1.1rem; }
        .learn-topic-card p { color: #94A3B8; font-size: 0.9rem; } .learn-topic-icon { font-size: 2rem; margin-bottom: 10px; }

        .biz-detail-card { background: #0F172A; padding: 15px; border-radius: 16px; margin-bottom: 10px; }
        .rented-badge { background: #FBBF24; color: #0F172A; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-left: 5px; }

</head>

        function saveGame(){
            const data={balance,capital,day,level,xp,customization,empire,inventory,portfolio,stocks,stockPrices,stockInvested,readBooks,

        let rentRequests=[],carRentRequests=[],activeRentals=[];
        function generateRentRequests(){
            const types=[{name:'Студия',basePrice:200},{name:'1-к квартира',basePrice:320},{name:'2-к квартира',basePrice:480},{name:'3-к квартира',basePrice:720},{name:'Дом',basePrice:1200},{name:'Таунхаус',basePrice:1000},{name:'Замок',basePrice:4000},{name:'Офис',basePrice:2000},{name:'Склад',basePrice:800},{name:'Пентхаус',basePrice:3200}];

            for(let i=0;i<5;i++){const td=types[Math.floor(Math.random()*types.length)];rentRequests.push({id:Date.now()+i,from:names[Math.floor(Math.random()*names.length)],type:td.name,days:Math.floor(Math.random()*5)+1,price:Math.floor(td.basePrice*(0.9+Math.random()*0.2)),total:Math.floor(td.basePrice*(0.9+Math.random()*0.2))*(Math.floor(Math.random()*5)+1)});}

        }
        const books=[{title:'Самый богатый человек в Вавилоне',desc:'Классика. Притчи о деньгах.'},{title:'Богатый папа, бедный папа',desc:'Активы vs пассивы.'},{title:'Психология денег',desc:'Эмоции в финансах.'},{title:'Думай и богатей',desc:'13 принципов.'},{title:'Путь к финансовой свободе',desc:'План на 7 лет.'}];

        function getTopEffect(effects){let maxEffect=0,topAsset='';Object.entries(effects).forEach(([k,v])=>{if(Math.abs(v)>Math.abs(maxEffect)){maxEffect=v;topAsset=k;}});if(maxEffect===0)return'Нейтральная';return`${assets[topAsset]?.name||topAsset} ${maxEffect>0?'📈':'📉'}`;}
        function render(){

            else if(selectedBizIndex!==null&&selectedBizIndex<empire.biz.length){const b=empire.biz[selectedBizIndex],bt=bizItems.find(bi=>bi.name===b.name)||b;const boost=1+(bt.sign||0)*0.03+(bt.ads||0)*0.05+(bt.workers||0)*0.07+(bt.floors-1)*0.1+(bt.equipment||0)*0.08+(bt.delivery?0.1:0);html+=`<button class="btn btn-secondary" id="backToBizList">← К списку</button><div class="card"><div class="empire-icon">${b.icon}</div><h3>${b.customName||b.name}</h3><p class="income-badge">📈 ${Math.floor(b.price*0.02*boost)}/10 мин (×${boost.toFixed(1)})</p></div><div class="grid"><div class="biz-detail-card"><h4>🪧 (${bt.sign||0})</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="sign" data-cost="${200+(bt.sign||0)*100}">${200+(bt.sign||0)*100}🪙</button></div><div class="biz-detail-card"><h4>📢 (${bt.ads||0})</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="ads" data-cost="${300+(bt.ads||0)*150}">${300+(bt.ads||0)*150}🪙</button></div><div class="biz-detail-card"><h4>👷 (${bt.workers||0})</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="workers" data-cost="${400+(bt.workers||0)*200}">${400+(bt.workers||0)*200}🪙</button></div><div class="biz-detail-card"><h4>🔧 (${bt.repair||0}/5)</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="repair" data-cost="${200+(bt.repair||0)*100}">${200+(bt.repair||0)*100}🪙</button></div><div class="biz-detail-card"><h4>🏗️ (${bt.floors||1})</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="floors" data-cost="${800+(bt.floors||1)*500}">${800+(bt.floors||1)*500}🪙</button></div><div class="biz-detail-card"><h4>⚙️ (${bt.equipment||0})</h4><button class="btn-small biz-upgrade" data-idx="${selectedBizIndex}" data-upg="equipment" data-cost="${600+(bt.equipment||0)*300}">${600+(bt.equipment||0)*300}🪙</button></div></div><button class="btn ${bt.delivery?'btn-secondary':''}" id="toggleDelivery">🚚 ${bt.delivery?'✅':'❌'} (${bt.delivery?0:1000}🪙)</button>`;}else{html+=`<div class="grid">${empire.biz.map((b,i)=>`<div class="card" data-biz="${i}"><div class="empire-icon">${b.icon}</div><h4>${b.customName||b.name}</h4><p class="income-badge">+${Math.floor(b.price*0.02)}/10 мин</p></div>`).join('')}</div>`;}html+=`</div>`;
            html+=`<div id="custom-page" class="page ${currentPage==='custom'?'active':''}"><h2 style="color:#FBBF24">🎨</h2><div class="card"><h3>Аватарки</h3><div class="grid" id="avatarGrid"></div><h3>Рамки</h3><div class="grid"><div class="card"><div class="frame-preview">${customization.icon}</div><p>Обычная</p><button class="btn-small buy-frame" data-frame="default" data-price="0">0 🪙</button></div><div class="card"><div class="frame-preview silver">${customization.icon}</div><p>Серебро</p><button class="btn-small buy-frame" data-frame="silver" data-price="1000">1000 🪙</button></div><div class="card"><div class="frame-preview gold">${customization.icon}</div><p>Золото</p><button class="btn-small buy-frame" data-frame="gold" data-price="5000">5000 🪙</button></div><div class="card"><div class="frame-preview neon">${customization.icon}</div><p>Неон</p><button class="btn-small buy-frame" data-frame="neon" data-price="10000">10000 🪙</button></div></div></div></div>`;
            html+=`<div id="news-page" class="page ${currentPage==='news'?'active':''}"><h2 style="color:#FBBF24">📰</h2>${newsHistory.slice(0,10).map(n=>`<div class="news-item"><strong>День ${n.day}:</strong> ${n.text}</div>`).join('')}</div>`;

            const allRE=[...empire.re.map(r=>({...r,rented:false})),...activeRentals.map(a=>a.obj).filter(o=>o&&reItems.some(ri=>ri.name===o.name)).map(o=>({...o,rented:true}))];
            const allCars=[...empire.cars.map(c=>({...c,rented:false})),...activeRentals.map(a=>a.obj).filter(o=>o&&carItems.some(ci=>ci.name===o.name)).map(o=>({...o,rented:true}))];
            html+=`<div id="profile-page" class="page ${currentPage==='profile'?'active':''}"><h2 style="color:#FBBF24">👤 Профиль</h2><div class="card" style="text-align:center"><div class="frame-preview ${frameClass}">${customization.icon}</div><h3>Игрок</h3><p><span class="level-badge">Ур. ${level}</span></p><div class="progress-bar"><div class="progress-fill" style="width:${(xp/5000)*100}%"></div></div><p>${xp}/5000 XP</p><p><span class="stat-value">${balance.toFixed(1)}</span> 🪙</p></div><div class="card" style="margin-top:15px"><h3 style="color:#FBBF24">🏢 Империя</h3><p><strong>🏠 Недвижимость (${allRE.length}):</strong> ${allRE.map(r=>`${r.icon} ${r.name} ⭐${r.level}${r.rented?' <span class="rented-badge">в аренде</span>':''}`).join(', ')||'Нет'}</p><p><strong>🚗 Машины (${allCars.length}):</strong> ${allCars.map(c=>`${c.icon} ${c.name} ⭐${c.level}${c.rented?' <span class="rented-badge">в аренде</span>':''}`).join(', ')||'Нет'}</p><p><strong>🏪 Бизнесы (${empire.biz.length}):</strong> ${empire.biz.map(b=>`${b.icon} ${b.customName||b.name} ⭐${b.level}`).join(', ')||'Нет'}</p><p class="income-badge">📈 Доход: ${income} 🪙/10 мин</p></div></div>`;
            app.innerHTML=html;
            if(currentPage==='custom')renderAvatars();if(currentPage==='rent')attachRentEvents();if(currentPage==='myBusiness')attachBizEvents();
            attachEvents();if(currentPage==='exchange')drawChart();updateAllBalances();saveGame();
        }
        function renderAvatars(){document.getElementById('avatarGrid').innerHTML=avatarIcons.map(icon=>`<div class="card" style="text-align:center"><div style="font-size:3rem">${icon}</div><button class="btn-small buy-avatar" data-icon="${icon}" data-price="500">500 🪙</button></div>`).join('');}
        function attachBizEvents(){
            document.querySelectorAll('.biz-upgrade').forEach(b=>{b.onclick=()=>{const idx=parseInt(b.dataset.idx),upg=b.dataset.upg,cost=parseInt(b.dataset.cost);if(balance>=cost){balance-=cost;const bt=bizItems.find(bi=>bi.name===empire.biz[idx].name);if(bt){if(upg==='sign')bt.sign=(bt.sign||0)+1;else if(upg==='ads')bt.ads=(bt.ads||0)+1;else if(upg==='workers')bt.workers=(bt.workers||0)+1;else if(upg==='repair'&&(bt.repair||0)<5)bt.repair=(bt.repair||0)+1;else if(upg==='floors')bt.floors=(bt.floors||1)+1;else if(upg==='equipment')bt.equipment=(bt.equipment||0)+1;}updateAllBalances();render();saveGame();}else alert('Недостаточно!');};});
            document.getElementById('toggleDelivery')?.addEventListener('click',()=>{const bt=bizItems.find(bi=>bi.name===empire.biz[selectedBizIndex].name);if(bt){if(!bt.delivery){if(balance>=1000){balance-=1000;bt.delivery=true;}else return alert('Недостаточно!');}else{bt.delivery=false;}}updateAllBalances();render();saveGame();});
            document.getElementById('backToBizList')?.addEventListener('click',()=>{selectedBizIndex=null;render();});
            document.querySelectorAll('[data-biz]').forEach(c=>{c.onclick=()=>{selectedBizIndex=parseInt(c.dataset.biz);render();};});
        }
        function attachRentEvents(){
            document.querySelectorAll('.accept-rent').forEach(b=>{b.onclick=()=>{const id=parseFloat(b.dataset.id),type=b.dataset.type,cat=b.dataset.category;let req,arr;if(cat==='re'){req=rentRequests.find(r=>r.id===id);arr=empire.re;}else{req=carRentRequests.find(r=>r.id===id);arr=empire.cars;}if(!req)return;const obj=arr.filter(o=>o.name===type)[parseInt(document.getElementById(`${cat==='re'?'rent':'car-rent'}-select-${id}`).value)];if(!obj){alert(`Нет ${type}!`);return;}if(cat==='re'){empire.re=empire.re.filter(o=>o!==obj);rentRequests=rentRequests.filter(r=>r.id!==id);}else{empire.cars=empire.cars.filter(o=>o!==obj);carRentRequests=carRentRequests.filter(r=>r.id!==id);}activeRentals.push({...req,obj,endTime:Date.now()+req.days*600000});balance+=req.total;updateAllBalances();render();saveGame();alert(`+${req.total} 🪙`);};});
            document.getElementById('refreshRent').onclick=()=>{if(Date.now()-lastRentRefresh<10000)return alert('Раз в 10 сек!');lastRentRefresh=Date.now();generateRentRequests();render();};
        }
        function drawChart(){const canvas=document.getElementById('priceChart');if(!canvas)return;const ctx=canvas.getContext('2d'),hist=assets[selectedAsset].history,w=300,h=180;canvas.width=w;canvas.height=h;ctx.clearRect(0,0,w,h);if(hist.length<2)return;const max=Math.max(...hist),min=Math.min(...hist),range=max-min||1;ctx.strokeStyle='#334155';ctx.lineWidth=0.5;for(let i=0;i<=4;i++){const y=20+(h-40)*(i/4);ctx.beginPath();ctx.moveTo(35,y);ctx.lineTo(w-10,y);ctx.stroke();ctx.fillStyle='#94A3B8';ctx.font='9px Arial';ctx.fillText((max-(i/4)*range).toFixed(0)+'🪙',2,y+3);}ctx.beginPath();ctx.strokeStyle='#FBBF24';ctx.lineWidth=2;hist.forEach((p,i)=>{const x=35+(i/(hist.length-1))*(w-45);const y=20+((max-p)/range)*(h-40);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();}
        function updateAllBalances(){document.getElementById('mobileBalance').textContent=balance.toFixed(1);document.getElementById('mobileLevel').textContent=`Ур. ${level}`;}
        function attachEvents(){
            document.querySelectorAll('[data-page]').forEach(el=>{el.onclick=()=>{currentPage=el.dataset.page;document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));el.classList.add('active');if(currentPage==='learn')currentLearnTopic=null;if(currentPage==='myBusiness')selectedBizIndex=null;render();};});
            document.querySelectorAll('[data-go]').forEach(el=>{el.onclick=()=>{currentPage=el.dataset.go;render();};});
            document.querySelectorAll('.learn-topic-card').forEach(c=>{c.onclick=()=>{currentLearnTopic=c.dataset.topic;render();};});
            document.getElementById('backToLearn')?.addEventListener('click',()=>{currentLearnTopic=null;render();});
            document.querySelectorAll('.buy-btn').forEach(b=>{b.onclick=()=>{const k=b.dataset.k;const current=portfolio[k]||0;if(current>=10){alert('Нельзя иметь больше 10 единиц одного актива!');return;}if(balance>=assets[k].price){balance-=assets[k].price;portfolio[k]=(portfolio[k]||0)+1;render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.sell-btn').forEach(b=>{b.onclick=()=>{const k=b.dataset.k;if(portfolio[k]>0){portfolio[k]--;balance+=assets[k].price;render();saveGame();}else alert('Нет!');};});
            document.getElementById('nextDayBtn').onclick=()=>{const hasStocks=Object.values(portfolio).some(v=>v>0);if(hasStocks){consecutiveNextDays++;}else{consecutiveNextDays=0;}const cost=hasStocks?(consecutiveNextDays>=10?6:4):1;if(balance<cost)return alert('Недостаточно!');balance-=cost;day++;daysSinceLastNews++;if(daysSinceLastNews>=4&&currentNews.remaining<=0){daysSinceLastNews=0;const news=newsList[Math.floor(Math.random()*newsList.length)];currentNews={text:news.text,effects:{...news.effects},remaining:4};newsHistory.unshift({day,text:news.text});if(newsHistory.length>10)newsHistory.pop();}if(currentNews.remaining>0){currentNews.remaining--;}Object.keys(assets).forEach(k=>{const effect=currentNews.remaining>=0?(currentNews.effects[k]||0):0;const deviation=(assets[k].price-basePrices[k])/basePrices[k];const meanReversion=-deviation*0.5;const randomChange=(Math.random()*12-6)*(Math.random()>0.5?1:-1);const change=effect+randomChange+meanReversion;assets[k].price=Math.max(50,assets[k].price*(1+change/100));assets[k].history.push(assets[k].price);if(assets[k].history.length>15)assets[k].history.shift();});Object.keys(stockPrices).forEach(k=>{stockPrices[k]=Math.max(50000,stockPrices[k]*(1+(Math.random()*6-3)/100));});render();saveGame();};
            document.getElementById('assetSelect').onchange=(e)=>{selectedAsset=e.target.value;drawChart();};
            document.querySelectorAll('.buy-re').forEach(b=>{b.onclick=()=>{const i=reItems[parseInt(b.dataset.idx)];if(balance>=i.price){balance-=i.price;empire.re.push({...i});render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.upgrade-re').forEach(b=>{b.onclick=()=>{const i=reItems[parseInt(b.dataset.idx)];const cost=Math.floor(i.price*(0.35+(i.level-1)*0.09));if(i.level>=8)return alert('Макс!');if(balance>=cost){balance-=cost;i.level++;i.inc=Math.floor(i.price*0.02);render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.buy-car').forEach(b=>{b.onclick=()=>{const i=carItems[parseInt(b.dataset.idx)];if(balance>=i.price){balance-=i.price;empire.cars.push({...i});render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.upgrade-car').forEach(b=>{b.onclick=()=>{const i=carItems[parseInt(b.dataset.idx)];const cost=Math.floor(i.price*(0.35+(i.level-1)*0.09));if(i.level>=8)return alert('Макс!');if(balance>=cost){balance-=cost;i.level++;i.inc=Math.floor(i.price*0.02);render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.buy-biz').forEach(b=>{b.onclick=()=>{const i=bizItems[parseInt(b.dataset.idx)];const ni=document.getElementById(`bizname-${parseInt(b.dataset.idx)}`);if(ni)i.customName=ni.value||i.name;if(balance>=i.price){balance-=i.price;empire.biz.push({...i});render();saveGame();}else alert('Недостаточно!');};});
            document.getElementById('collectBtn').onclick=()=>{const inc=empire.re.reduce((s,i)=>s+i.inc*i.level,0)+empire.cars.reduce((s,i)=>s+i.inc*i.level,0)+empire.biz.reduce((s,i)=>s+i.inc*i.level,0);if(inc===0)return alert('Нет!');balance+=inc;render();saveGame();alert(`+${inc} 🪙`);};
            document.querySelectorAll('.read-btn').forEach(b=>{b.onclick=function(){const bi=parseInt(this.dataset.book);if(!readBooks.includes(bi)){this.disabled=true;this.textContent='✓ Прочитано';readBooks.push(bi);balance+=100;xp+=100;render();saveGame();}};});
            document.querySelectorAll('.buy-avatar').forEach(b=>{b.onclick=()=>{if(balance>=500){balance-=500;customization.icon=b.dataset.icon;updateAllBalances();render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.buy-frame').forEach(b=>{b.onclick=()=>{if(balance>=parseInt(b.dataset.price)){balance-=parseInt(b.dataset.price);customization.frame=b.dataset.frame;updateAllBalances();render();saveGame();}else alert('Недостаточно!');};});
            document.querySelectorAll('.buy-stock').forEach(b=>{b.onclick=()=>{const stock=b.dataset.stock;const amount=parseInt(document.getElementById(`invest-${stock}`).value);if(amount>0&&balance>=amount){balance-=amount;stockInvested[stock]+=amount;render();saveGame();}else alert('Недостаточно!');};});
        }
        function collectAllIncome(){const inc=empire.re.reduce((s,i)=>s+i.inc*i.level,0)+empire.cars.reduce((s,i)=>s+i.inc*i.level,0)+empire.biz.reduce((s,i)=>s+i.inc*i.level,0);if(inc>0){balance+=inc;capital+=inc;}Object.entries(stockInvested).forEach(([k,v])=>{if(v>0){balance+=Math.floor(v*0.02);capital+=Math.floor(v*0.02);}});updateAllBalances();saveGame();Object.keys(stockPrices).forEach(k=>{stockPrices[k]=Math.max(50000,stockPrices[k]*(1+(Math.random()*4-2)/100));});}
        loadGame();generateRentRequests();render();
        setInterval(saveGame,5000);setInterval(collectAllIncome,420000);
    </script>
</body>
</html>
